<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="icon" href="webfonts/phone.svg">
    <link rel="stylesheet" href="CSS/contactupdate.css">
 
</head>
<body>

    <header class="navbar">
        <div class="logo">
         <a href="index.html" target="_blank"><img src="IMG/logo-navbar.svg" alt="Lakay AI" height="70px"></a>
         <!-- <a href="index.html" target="_blank"><h2 class="titre">LakAI</h2></a> -->
        </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="apropos.html"> A propos</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <div class="box11">
        <h1>Contactez-nous</h1>
    </div>

<div class="formu">
    <form action="">
       <div class="lab">
            <div class="label-icon">
             <img src="Webfonts/user-alt.svg" alt="user" width="20" height="20">
             <label for="nom">Nom</label>
            </div>
            <input type="text" id="nom" name="nom" placeholder="Louis" required>
        </div>

        <div class="lab">
            <div class="label-icon">
            <img src="Webfonts/user-alt.svg" alt="user" width="20" height="20">
             <label for="prenom">Prénom</label>
            </div>
            <input type="text" id="prenom" name="prenom" placeholder="Julien" required>
        </div>

<div class="lab">
    <div class="label-icon">
        <img src="Webfonts/envelope.svg" alt="email" width="20" height="20">
        <label for="email">Email</label>
    </div>
    <input type="email" id="email" name="email" placeholder="julienlouis01@gmail.com" required>
</div>

<div class="lab">
    <div class="label-icon">
        <img src="Webfonts/tag.svg" alt="sujet" width="20" height="20">
        <label for="sujet">Objet</label>
    </div>
    <select name="sujet" id="sujet">
        <option value=""  disabled selected>Veuillez choisir un sujet</option>
        <option value="assistance">Assistance technique</option>
        <option value="paiement">Problème de paiement</option>
        <option value="information">Demande d'information</option>
        <option value="service">Question sur un service</option>
        <option value="partenariat">Partenariat</option>
        <option value="autre">Autre</option>
    </select>
</div>

<div class="lab">
    <div class="label-icon">
        <img src="Webfonts/comment.svg" alt="message" width="20" height="20">
        <label for="text">Message</label>
    </div>
    <textarea name="text" id="text" placeholder="Je vous contacte ..."></textarea>
</div>
    <button type="submit">Envoyer</button>
    </form>
</div>
</main>

<footer>
    <p>&copy; 2026 Lakay Agence Immobilière. Tous droits réservés.</p>
    <p>Les Cayes, Haïti</p>
</footer>
</body>
</html>
